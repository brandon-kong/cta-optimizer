[tox]
envlist = py37,py38,py39,py310,312,coverage

[testenv]
commands =
    python -m coverage run -m unittest discover -s tests

[testenv:coverage]
basepython = python3.12
commands =
    python -m coverage combine
    python -m coverage report -m --skip-covered
    python -m coverage json

[gh-actions]
python =
    3.7: py37
    3.8: py38
    3.9: py39
    3.10: py310
    3.12: py312